name: cme-viewer
channels:
  - conda-forge
  - defaults
dependencies:
  # Base Python (Safe and optimized for both OSs)
  - python=3.12

  # Core Scientific & Data Processing (Cross-Platform Compliant)
  - astropy>=7.2
  - matplotlib>=3.10
  - numpy>=2.4
  - pooch>=1.8
  - pyhdf>=0.11
  - scipy>=1.17
  - sunpy>=7.0

  # Trame & Rendering
  - pyvista>=0.46
  - vtk
  - trame>=3.12
  - trame-client>=3.11
  - trame-vuetify>=3.2
  - trame-vtk

  # Utilities
  - python-dotenv>=1.2
  - pyyaml>=6.0
  - requests>=2.34
  - tomli>=2.4
  - pip

  # Custom / Specialized Packages (Handled via pip)
  - pip:
    - mapflpy==1.1.9
    - psi_io==2.0.6
    - pthree==1.0.1
    - git+https://github.com/predsci/pyvisual.git  # NEW: Installed directly from source